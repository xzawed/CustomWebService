[extend]
useDefault = true

[allowlist]
description = "허용 경로 — 예제/테스트/문서 파일"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.template$''',
  '''(^|/)src/__tests__/''',
  '''(^|/)src/test/''',
  '''(^|/)docs/''',
  '''(^|/)README''',
  '''(^|/)\.gitleaks\.toml$''',
]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-api[0-9A-Za-z\-_]{40,}'''
secretGroup = 0
tags = ["key", "anthropic", "ai"]

[[rules]]
id = "admin-api-key-env"
description = "ADMIN_API_KEY 평문 할당"
regex = '''ADMIN_API_KEY\s*[=:]\s*['"]?[0-9a-fA-F]{20,}['"]?'''
secretGroup = 0
tags = ["key", "admin"]

[[rules]]
id = "railway-token"
description = "Railway Deploy Token"
regex = '''RAILWAY_TOKEN\s*[=:]\s*['"]?[A-Za-z0-9\-_]{30,}['"]?'''
secretGroup = 0
tags = ["key", "railway"]

name: Claude CLI Automation

on:
  repository_dispatch:
    types: [claude-fix, claude-investigate, claude-fix-review]

concurrency:
  group: claude-automation
  cancel-in-progress: false

jobs:
  claude-task:
    name: Claude CLI Task
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude CLI Bot"
          git config user.email "claude-bot@xzawed.xyz"

      - name: Create feature branch
        run: |
          BRANCH="claude/${{ github.event.action }}/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run Claude CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "${{ github.event.client_payload.task_description }}" \
            --allowedTools "Edit,Write,Bash,Read,Glob,Grep" \
            --max-turns 20

      - name: Run verification
        run: |
          pnpm lint || true
          pnpm type-check
          pnpm test

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "${{ github.event.client_payload.commit_message || 'fix: Claude CLI 자동 수정' }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ github.event.client_payload.pr_title || '[Auto] Claude CLI Fix' }}" \
            --body "$(cat <<'PREOF'
          ## Summary
          ${{ github.event.client_payload.pr_body || 'Automated fix by Claude CLI triggered via n8n' }}

          ## Triggered by
          - Workflow: `${{ github.event.action }}`
          - Run ID: `${{ github.run_id }}`

          🤖 Generated with [Claude Code](https://claude.ai/claude-code)
          PREOF
          )" \
            --base main \
            --head "$BRANCH"
